# Render Blueprint for MY-SITE
# Auto-deploy enabled with instant rollover
# NOTE: This service (my-site) is completely separate from the elite-wealthcapita
# repository and its Render service. Do NOT connect them to the same service.

databases:
  - name: my-site-db
    databaseName: my_site
    user: my_site_admin
    plan: free

services:
  - type: web
    name: my-site
    runtime: docker
    plan: starter
    region: oregon
    
    # Auto-deploy on every git push
    autoDeploy: true
    
    # Single instance - old deploy replaced instantly
    numInstances: 1
    
    # Health check for zero-downtime deploys
    healthCheckPath: /
    
    # Kill old instance quickly (5 seconds grace period)
    maxShutdownDelaySeconds: 5
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-site-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: elite_wealth.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,my-site.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Email settings - set these in the Render dashboard
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false  # Set in dashboard - your email address
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Set in dashboard - your email app password
      - key: DEFAULT_FROM_EMAIL
        sync: false  # Set in dashboard - your from email address
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false  # Set in dashboard - admin notification email