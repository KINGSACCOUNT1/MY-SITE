{% extends 'base.html' %}

{% block title %}Reject KYC - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-times-circle me-2"></i>Reject KYC</h4>
                </div>
                <div class="card-body">
                    <p><strong>User:</strong> {{ kyc.user.email }}</p>
                    <p><strong>Document:</strong> {{ kyc.get_document_type_display }} - {{ kyc.document_number }}</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Rejection Reason <span class="text-danger">*</span></label>
                            <textarea name="rejection_reason" class="form-control" rows="4" required 
                                      placeholder="Explain why the KYC is being rejected (user will see this)"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-times me-2"></i>Reject KYC
                            </button>
                            <a href="{% url 'dashboard:admin_panel' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
