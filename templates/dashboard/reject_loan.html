{% extends 'base.html' %}

{% block title %}Reject Loan - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-times-circle me-2"></i>Reject Loan Application</h4>
                </div>
                <div class="card-body">
                    <p><strong>User:</strong> {{ loan.user.email }}</p>
                    <p><strong>Amount:</strong> ${{ loan.amount|floatformat:2 }}</p>
                    <p><strong>Purpose:</strong> {{ loan.purpose }}</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Reason for Rejection <span class="text-danger">*</span></label>
                            <textarea name="admin_notes" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-times me-2"></i>Reject Loan
                            </button>
                            <a href="{% url 'dashboard:admin_panel' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
